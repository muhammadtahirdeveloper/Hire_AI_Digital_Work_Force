# ============================================
# GmailMind — Local Development Stack
# ============================================
# Usage:  docker-compose up --build
# Stop:   docker-compose down
# Reset:  docker-compose down -v  (removes volumes)
# ============================================

version: "3.9"

services:
  # ------------------------------------------
  # FastAPI — Main API server (includes APScheduler)
  # ------------------------------------------
  gmailmind-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gmailmind-api
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      DATABASE_URL: ${DATABASE_URL}
      HTTPS: ${HTTPS:-false}
    command: >
      sh -c "python scripts/setup_db.py &&
             uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - .:/app
      - ./ssl:/app/ssl
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ------------------------------------------
  # PostgreSQL + pgvector
  # ------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gmailmind-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gmailmind
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gmailmind"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
