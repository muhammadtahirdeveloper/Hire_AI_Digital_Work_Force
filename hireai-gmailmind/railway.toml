[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'if [ \"$SERVICE_TYPE\" = \"worker\" ]; then celery -A scheduler.celery_app worker --loglevel=info --concurrency=2 -Q default,agent,followups,reports; elif [ \"$SERVICE_TYPE\" = \"beat\" ]; then celery -A scheduler.celery_app beat --loglevel=info; else uvicorn api.main:app --host 0.0.0.0 --port ${PORT:-8000}; fi'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
