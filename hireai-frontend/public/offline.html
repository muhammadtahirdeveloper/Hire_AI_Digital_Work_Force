<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HireAI — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f8fafc;
      color: #1e293b;
      padding: 1rem;
    }
    .container { text-align: center; max-width: 400px; }
    .logo {
      width: 80px; height: 80px;
      background: #2563eb;
      color: white;
      font-size: 2rem;
      font-weight: 700;
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
    p { font-size: 0.875rem; color: #64748b; line-height: 1.6; }
    .btn {
      margin-top: 1.5rem;
      display: inline-block;
      background: #2563eb;
      color: white;
      padding: 0.625rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">H</div>
    <h1>You're Offline</h1>
    <p>
      It looks like you've lost your internet connection. HireAI needs
      an active connection to sync with your inbox. Please reconnect and
      try again.
    </p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
